<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <title>{{ page.title | default: site.title }}</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">

    <!-- Dark mode: apply saved preference before CSS loads to prevent flash -->
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>

    <!-- Favicons -->
    <link rel="icon" media="(prefers-color-scheme:dark)" href="{{ site.favicon_dark }}" type="image/png">
    <link rel="icon" media="(prefers-color-scheme:light)" href="{{ site.favicon }}" type="image/png">
    <script src="./assets/js/favicon-switcher.js" type="application/javascript"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.8.6/css/academicons.min.css" integrity="sha256-uFVgMKfistnJAfoCUQigIl+JfUaP47GrRKjf6CTPVmw=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css" integrity="sha256-+N4/V/SbAFiW1MPBCXnfnP9QSN3+Keu+NlB+0ev/YKQ=" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">

    {% if site.font == "Sans Serif" %}
      <link rel="stylesheet" href="./assets/css/font_sans_serif.css">
    {% else %}
      <link rel="stylesheet" href="./assets/css/font.css">
    {% endif %}

    {% if site.auto_dark_mode %}
      <link rel="stylesheet" href="./assets/css/style.css">
      <link rel="stylesheet" href="./assets/css/publications.css">
    {% else %}
      <link rel="stylesheet" href="./assets/css/style-no-dark-mode.css">
      <link rel="stylesheet" href="./assets/css/publications-no-dark-mode.css">
      <link rel="stylesheet" href="./assets/css/nav.css">
    {% endif %}

    {% if page.extra_css %}
      <link rel="stylesheet" href="{{ page.extra_css }}">
    {% endif %}
  </head>
  <body>
    <!-- Top Navigation -->
    <div class="topnav">
      <div id="myLinks">
        {% include navigation.md %}
      </div>
      <button id="dark-mode-toggle" class="dark-toggle" title="Toggle dark mode">
        <i class="fas fa-moon"></i>
      </button>
      <a href="javascript:void(0);" class="icon" onclick="toggleNav()">
        <i class="fa fa-bars"></i>
      </a>
    </div>

    <script>
      function toggleNav() {
        var navLinks = document.getElementById("myLinks");
        navLinks.classList.toggle("active");
        reverseLinks();
      }
      function reverseLinks() {
        var container = document.getElementById("myLinks");
        var links = Array.from(container.getElementsByTagName('a'));
        container.innerHTML = '';
        for (var i = links.length - 1; i >= 0; i--) {
          container.appendChild(links[i]);
        }
      }
    </script>

    <div class="page-content">
      {{ content }}
    </div>

    <!-- Leaflet Map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('talks-map');
        var dataEl = document.getElementById('talks-data');
        if (!el || !dataEl) return;

        var talks = JSON.parse(dataEl.textContent);
        var map = L.map('talks-map', { scrollWheelZoom: false }).setView([38, -95], 3);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
          maxZoom: 10
        }).addTo(map);

        var icon = L.divIcon({
          className: '',
          html: '<div style="width:12px;height:12px;background:#0f4d92;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',
          iconSize: [12, 12],
          iconAnchor: [6, 6]
        });

        talks.forEach(function (t) {
          if (t.lat && t.lng) {
            L.marker([t.lat, t.lng], { icon: icon })
              .addTo(map)
              .bindPopup('<strong>' + t.venue + ' ' + t.year + '</strong><br>' + t.location + '<br><em>' + t.title + '</em>');
          }
        });
      });
    </script>

    <!-- Feature Scripts -->
    <script src="./assets/js/dark-mode.js"></script>
    <script src="./assets/js/bibtex.js"></script>

    {% if site.google_analytics %}
      <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', '{{ site.google_analytics }}');
      </script>
    {% endif %}
  </body>
</html>
